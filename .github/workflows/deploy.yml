name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install & Build
        run: npm install && npm run build && ls -la dist/
      
      - name: Create Pages project if needed
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"alpha-quant-analytics","production_branch":"main"}' | tee /tmp/create_resp.json
          echo ""
          echo "Project creation response above (may fail if already exists - that is OK)"
      
      - name: Deploy via Direct Upload
        run: |
          echo "Creating deployment..."
          DEPLOY_RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/alpha-quant-analytics/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -F "index.html=@dist/index.html")
          echo "$DEPLOY_RESP" | head -200
          
          SUCCESS=$(echo "$DEPLOY_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))" 2>/dev/null || echo "false")
          if [ "$SUCCESS" = "True" ] || [ "$SUCCESS" = "true" ]; then
            URL=$(echo "$DEPLOY_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['url'])" 2>/dev/null || echo "unknown")
            echo "✅ Deployed successfully to: $URL"
          else
            echo "❌ Deploy failed. Full response above."
            exit 1
          fi
